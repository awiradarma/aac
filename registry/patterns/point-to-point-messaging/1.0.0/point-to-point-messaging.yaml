id: point-to-point-messaging
name: Point-to-Point Messaging
version: 1.0.0
description: "A standard producer-consumer messaging topology."
scopes: [container]

composition:
  container:
    nodes:
      - id_suffix: producer
        widget_ref: executable@1.0.0
        label: Producer Service
        c4Level: Container
        reuse_existing: false
        min: 1
        max: n
        layout_hint: { x: 0, y: 50 }

      - id_suffix: queue
        widget_ref: message-queue@1.0.0
        label: Ingestion Queue
        c4Level: Container
        reuse_existing: false
        min: 1
        max: 1
        layout_hint: { x: 250, y: 50 }
        properties: { technology: MQ }

      - id_suffix: consumer
        widget_ref: executable@1.0.0
        label: Consumer Service
        c4Level: Container
        reuse_existing: false
        min: 1
        max: n
        layout_hint: { x: 500, y: 50 }


    edges:
      - source_suffix: producer
        target_suffix: queue
        source_handle: source-bottom
        target_handle: target-left
        styleVariant: dashed
        label: send
      - source_suffix: queue
        target_suffix: consumer
        source_handle: source-right
        target_handle: target-bottom  
        direction: forward
        styleVariant: dashed
        label: receive

rules:
  - id: require-producer
    scope: container
    severity: mandatory
    type: node_existence
    node: "id_suffix:producer"
  - id: require-queue
    scope: container
    severity: mandatory
    type: node_existence
    node: "id_suffix:queue"
  - id: require-consumer
    scope: container
    severity: mandatory
    type: node_existence
    node: "id_suffix:consumer"
  - id: force-mq
    scope: container
    severity: mandatory
    type: property_constraint
    node: "id_suffix:queue"
    property: technology
    allowed_values: [MQ]
  - id: require-edge-pro-queue
    scope: container
    severity: mandatory
    type: edge_existence
    source: "id_suffix:producer"
    target: "id_suffix:queue"
  - id: require-edge-queue-con
    scope: container
    severity: mandatory
    type: edge_existence
    source: "id_suffix:queue"
    target: "id_suffix:consumer"

display_metadata:
  icon: FastForward
  color: slate
  category: Container
