id: internal-api-ocp
name: Internal API on OpenShift
version: 2.1.0
description: Multi-region API deployment with GSLB and API Gateway ingress.
scopes: [deployment]

composition:
  deployment:
    nodes:
      - id_suffix: cluster
        widget_ref: openshift-cluster-v4@4.12.0
        label: Standard OpenShift Cluster Instance
        layer: Cluster
        c4Level: DeploymentNode
        layout_hint: { x: 450, y: 80 }
        property_mappings:
          datacenter_id: parent.properties.dc_id
      - id_suffix: lb
        widget_ref: local-load-balancer@2.0.0
        label: Local Load Balancer Instance
        c4Level: InfrastructureNode
        layout_hint: { x: 0, y: 80 }
      - id_suffix: gw
        widget_ref: api-gateway@2.0.0
        label: API Gateway Instance
        c4Level: InfrastructureNode
        layout_hint: { x: 0, y: 0 }
    edges:
      - source_suffix: gw
        target_suffix: lb
      - source_suffix: lb
        target_suffix: cluster
    workload_target_suffix: cluster

rules:
  - id: require-cluster
    scope: deployment
    severity: mandatory
    type: node_existence
    node: "id_suffix:cluster"
  - id: require-lb
    scope: deployment
    severity: mandatory
    type: node_existence
    node: "id_suffix:lb"
  - id: require-gw
    scope: deployment
    severity: mandatory
    type: node_existence
    node: "id_suffix:gw"
  - id: enforce-avi-lb
    scope: deployment
    severity: mandatory
    type: property_constraint
    node: "id_suffix:lb"
    property: provider
    allowed_values: [avi]
  - id: enforce-apigee-gw
    scope: deployment
    severity: mandatory
    type: property_constraint
    node: "id_suffix:gw"
    property: provider
    allowed_values: [apigee]
  - id: require-gw-lb-edge
    scope: deployment
    severity: mandatory
    type: edge_existence
    source: "id_suffix:gw"
    target: "id_suffix:lb"
  - id: require-lb-cluster-edge
    scope: deployment
    severity: mandatory
    type: edge_existence
    source: "id_suffix:lb"
    target: "id_suffix:cluster"
  - id: secure-path
    scope: deployment
    severity: mandatory
    type: connectivity
    to: "id_suffix:cluster"
    must_pass_through: ["id_suffix:gw", "id_suffix:lb"]

deployment_constraints:
  host_capability: openshift-cluster-v4
  allowed_hierarchies:
    - on-prem-ocp

display_metadata:
  icon: Box
  color: blue
  category: Container
