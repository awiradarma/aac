id: internal-api-ocp
name: Internal API on OpenShift
version: 3.0.0
description: Enterprise API deployment on OCP with gateway and load balancer.

scopes: [container, deployment]

composition:
  container:
    nodes:
      - id_suffix: api
        widget_ref: api-container@1.0.0
        label: Application Endpoint
        c4Level: Container
        layout_hint: { x: 50, y: 80 }

  deployment:
    nodes:
      - id_suffix: cluster
        widget_ref: openshift-cluster-v4@4.12.0
        label: API Hosting Cluster
        layer: Cluster
        c4Level: DeploymentNode
        layout_hint: { x: 450, y: 80 }
        property_mappings:
          datacenter_id: parent.properties.dc_id
        children:
          - id_suffix: api
            widget_ref: api-container@1.0.0
            label: Application Endpoint
            c4Level: Container
            layout_hint: { x: 50, y: 80 }
      - id_suffix: lb
        widget_ref: local-load-balancer@2.0.0
        label: LB
        c4Level: InfrastructureNode
        layout_hint: { x: 0, y: 80 }
        properties: { provider: avi }
      - id_suffix: gw
        widget_ref: api-gateway@2.0.0
        label: Gateway
        c4Level: InfrastructureNode
        layout_hint: { x: 0, y: 0 }
        properties: { provider: apigee }
    edges:
      - source_suffix: gw
        target_suffix: lb
      - source_suffix: lb
        target_suffix: api

rules:
  # -- Deployment scope rules --
  - id: require-gateway
    scope: deployment
    severity: mandatory
    type: node_existence
    node: "id_suffix:gw"
  - id: require-lb
    scope: deployment
    severity: mandatory
    type: node_existence
    node: "id_suffix:lb"
  - id: require-cluster
    scope: deployment
    severity: mandatory
    type: node_existence
    node: "id_suffix:cluster"
  - id: enforce-avi-lb
    scope: deployment
    severity: mandatory
    type: property_constraint
    node: "id_suffix:lb"
    property: provider
    allowed_values: [avi]
  - id: enforce-apigee-gw
    scope: deployment
    severity: mandatory
    type: property_constraint
    node: "id_suffix:gw"
    property: provider
    allowed_values: [apigee]
  - id: require-gw-lb-edge
    scope: deployment
    severity: mandatory
    type: edge_existence
    source: "id_suffix:gw"
    target: "id_suffix:lb"
  - id: require-lb-api-edge
    scope: deployment
    severity: mandatory
    type: edge_existence
    source: "id_suffix:lb"
    target: "id_suffix:api"
  - id: secure-path
    scope: deployment
    severity: mandatory
    type: connectivity
    to: "id_suffix:api"
    must_pass_through: ["id_suffix:gw", "id_suffix:lb"]
  # -- Container scope rules --
  - id: require-api
    scope: all
    severity: mandatory
    type: node_existence
    node: "id_suffix:api"
  # -- Cross-scope warning --
  - id: infra-not-placed
    scope: container
    severity: recommended
    type: node_existence
    node: "id_suffix:gw"
    description: >
      API Gateway has not been placed yet. Switch to the Deployment
      diagram to complete the infrastructure for this pattern.

  - id: observability-sidecar
    scope: deployment
    severity: recommended
    type: node_existence
    node: "id_suffix:monitoring"
    description: >
      Consider adding an observability sidecar for production readiness.

deployment_constraints:
  host_capability: openshift-cluster-v4
  allowed_hierarchies: [on-prem-ocp]

display_metadata:
  icon: Box
  color: blue
  category: Container
