id: batch-workload-ocp
name: Autosys Batch on OpenShift
version: 1.0.0
description: Batch job triggered by Autosys via Kubernetes Plugin.
scopes: [container, deployment]
parameters:
  scheduler:
    type: string
    const: autosys
deployment_constraints:
  host_capability: openshift-cluster-v4
  required_plugins:
    - autosys-k8s-agent
  allowed_hierarchies:
    - on-prem-ocp
composition:
  container:
    nodes:
      - id_suffix: workload
        widget_ref: batch-container@1.0.0
        label: Autosys Batch Job
        c4Level: Container
        layout_hint: { x: 50, y: 80 }
  deployment:
    nodes:
      - id_suffix: cluster
        widget_ref: openshift-cluster-v4@4.12.0
        label: Standard OpenShift Cluster Instance
        layer: Cluster
        c4Level: DeploymentNode
        layout_hint: { x: 0, y: 0 }
        children:
          - id_suffix: workload
            widget_ref: batch-container@1.0.0
            label: Autosys Batch Job
            c4Level: Container
            layout_hint: { x: 50, y: 80 }
    workload_target_suffix: cluster
rules:
  - id: require-cluster
    scope: deployment
    severity: mandatory
    type: node_existence
    node: "id_suffix:cluster"
  - id: require-workload
    scope: all
    severity: mandatory
    type: node_existence
    node: "id_suffix:workload"
display_metadata:
  icon: Box
  color: blue
  category: Container
