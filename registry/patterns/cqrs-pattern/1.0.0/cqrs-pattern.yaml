id: cqrs-pattern
name: CQRS Architecture
version: 1.0.0
c4Level: Component
description: "Separates read and write operations into distinct command and query components."

composition:
  nodes:
    - id_suffix: api
      type: componentNode
      widget_ref: generic-component@1.0.0
      label: API Controller
      c4Level: Component
      layout_hint: { x: 250, y: 0 }

    - id_suffix: command_handler
      type: componentNode
      widget_ref: generic-component@1.0.0
      label: Command Handler
      c4Level: Component
      layout_hint: { x: 50, y: 150 }

    - id_suffix: query_handler
      type: componentNode
      widget_ref: generic-component@1.0.0
      label: Query Handler
      c4Level: Component
      layout_hint: { x: 450, y: 150 }

    - id_suffix: write_repo
      type: componentNode
      widget_ref: generic-component@1.0.0
      label: Write Repository
      c4Level: Component
      layout_hint: { x: 50, y: 300 }

    - id_suffix: read_repo
      type: componentNode
      widget_ref: generic-component@1.0.0
      label: Read Repository
      c4Level: Component
      layout_hint: { x: 450, y: 300 }

    - id_suffix: sync_bus
      type: componentNode
      widget_ref: generic-component@1.0.0
      label: Event Synchronizer
      c4Level: Component
      layout_hint: { x: 250, y: 375 }

  edges:
    - source_suffix: api
      target_suffix: command_handler
      source_handle: source-bottom
      target_handle: target-top
      label: exec command
      
    - source_suffix: api
      target_suffix: query_handler
      source_handle: source-bottom
      target_handle: target-top
      label: fetch query
      
    - source_suffix: command_handler
      target_suffix: write_repo
      source_handle: source-bottom
      target_handle: target-top
      label: mutate state
      
    - source_suffix: query_handler
      target_suffix: read_repo
      source_handle: source-bottom
      target_handle: target-top
      label: read state
      
    - source_suffix: write_repo
      target_suffix: sync_bus
      source_handle: source-bottom
      target_handle: target-left
      label: emits event
      styleVariant: dashed
      
    - source_suffix: sync_bus
      target_suffix: read_repo
      source_handle: source-right
      target_handle: target-bottom
      label: updates read model
      styleVariant: dashed

display_metadata:
  icon: SplitSquareHorizontal
  color: violet
  category: Component
