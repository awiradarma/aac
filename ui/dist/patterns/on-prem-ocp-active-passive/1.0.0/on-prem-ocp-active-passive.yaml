id: on-prem-ocp-active-passive
name: On-Prem OpenShift Active-Passive Hierarchy
version: 1.0.0
description: Pre-approved deployment hierarchy with a single Region containing two Datacenters, each containing an OpenShift cluster.
scopes: [deployment]
composition:
  deployment:
    nodes:
      - id_suffix: region-1
        type: deploymentNode
        widget_ref: region@1.0.0
        label: Primary Region
        c4Level: DeploymentNode
        children:
          - id_suffix: datacenter-1
            type: deploymentNode
            widget_ref: datacenter@1.0.0
            label: Primary Datacenter
            c4Level: DeploymentNode
            children:
              - id_suffix: cluster-1
                type: deploymentNode
                widget_ref: openshift-cluster-v4@4.12.0
                label: Primary OpenShift Cluster
                layer: Cluster
                c4Level: DeploymentNode
          - id_suffix: datacenter-2
            type: deploymentNode
            widget_ref: datacenter@1.0.0
            label: Passive Datacenter
            c4Level: DeploymentNode
            children:
              - id_suffix: cluster-2
                type: deploymentNode
                widget_ref: openshift-cluster-v4@4.12.0
                label: Passive OpenShift Cluster
                layer: Cluster
                c4Level: DeploymentNode
rules:
  - id: require-region
    scope: deployment
    severity: mandatory
    type: node_existence
    node: "id_suffix:region-1"
  - id: require-dc-1
    scope: deployment
    severity: mandatory
    type: node_existence
    node: "id_suffix:datacenter-1"
  - id: require-cluster-1
    scope: deployment
    severity: mandatory
    type: node_existence
    node: "id_suffix:cluster-1"
  - id: require-dc-2
    scope: deployment
    severity: mandatory
    type: node_existence
    node: "id_suffix:datacenter-2"
  - id: require-cluster-2
    scope: deployment
    severity: mandatory
    type: node_existence
    node: "id_suffix:cluster-2"
display_metadata:
  icon: Server
  color: slate
  category: DeploymentNode
